<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spherometer Lab - AL Science Squad</title>
    <style>
        :root { --bg: #0f0f0f; --accent: #bb86fc; --success: #00ffcc; --error: #ff5252; --text: #f0f0f0; --card: #1a1a1a; }
        
        body { 
            background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 5px; margin: 0; min-height: 100vh;
        }
        
        .header-section { text-align: center; margin-top: 10px; width: 100%; }
        .logo-container { width: 65px; height: 65px; margin: 0 auto 5px; }
        .logo-img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        .main-title { font-size: 1.4em; margin: 5px 0; font-weight: bold; }
        
        .visitor-box { 
            background: rgba(0, 255, 204, 0.1); padding: 5px 15px; border-radius: 50px; 
            border: 1px solid var(--success); display: inline-block; margin-bottom: 10px;
            color: var(--success); font-size: 0.85em; font-weight: bold;
        }

        /* Responsive Layout Settings */
        .main-wrapper { 
            display: flex; flex-direction: row; 
            background: var(--card); padding: 15px; border-radius: 20px; gap: 20px; 
            border: 1px solid #333; width: 95%; max-width: 1000px; 
            align-items: flex-start; justify-content: center;
        }

        .canvas-container { width: 100%; max-width: 400px; flex-shrink: 0; }
        canvas { 
            background: #151515; border-radius: 12px; border: 1px solid #444; 
            width: 100% !important; height: auto !important; display: block;
        }
        
        .controls { flex: 1; display: flex; flex-direction: column; gap: 12px; width: 100%; min-width: 300px; }
        .info-header { background: rgba(255, 82, 82, 0.1); padding: 12px; border-radius: 10px; border-left: 4px solid var(--error); font-size: 0.85em; line-height: 1.4; }

        .quiz-panel { background: #222; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .input-group { display: flex; gap: 8px; margin-top: 8px; }
        
        input[type=number] { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #000; color: white; text-align: center; font-size: 1.1em; }
        .btn-submit { background: var(--success); color: #000; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-submit:active { transform: scale(0.95); }
        
        input[type=range] { width: 100%; cursor: pointer; height: 12px; accent-color: var(--accent); margin: 5px 0; }
        select { padding: 12px; border-radius: 8px; background: #2c2c2c; color: white; border: 1px solid #444; width: 100%; font-size: 1em; cursor: pointer; }
        
        .footer { margin-top: 30px; text-align: center; padding: 20px; width: 100%; }
        .footer-brand-wrap { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 8px 0; }
        .footer-name { font-size: 1.5em; font-weight: bold; color: var(--accent); margin: 0; }
        .pointing-down { font-size: 2em; animation: bounceY 1s infinite; margin-top: 5px; }
        .pointing-right { font-size: 1.8em; animation: bounceRight 0.8s infinite; }
        .pointing-left { font-size: 1.8em; animation: bounceLeft 0.8s infinite; }

        @keyframes bounceY { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }
        @keyframes bounceRight { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(8px); } }
        @keyframes bounceLeft { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-8px); } }

        .footer-link a { color: var(--success); text-decoration: none; font-weight: bold; font-size: 1.1em; }

        /* Mobile Adjustments */
        @media (max-width: 850px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .canvas-container { max-width: 100%; }
            .controls { min-width: 100%; }
        }

        #congrats-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: rgba(0,0,0,0.9); }
    </style>
</head>
<body>

    <div id="congrats-overlay">
        <h1 style="color: var(--success); font-size: 3em; margin: 0;">EXCELLENT!</h1>
        <p style="color: white; font-size: 1.5em;">මිනුම නිවැරදියි! 🎊</p>
    </div>

    <div class="header-section">
        <div class="logo-container"><img src="photo_2026-06-02_10-22-04.jpg" alt="Logo" class="logo-img"></div>
        <div class="main-title">ගෝලමානය AI Simulation</div>
        <div class="visitor-box">🌐 මුළු පරිශීලකයන්: <span id="userCountDisplay">150</span>+</div>
    </div>

    <div class="main-wrapper">
        <div class="canvas-container">
            <canvas id="labCanvas" width="400" height="500"></canvas>
        </div>

        <div class="controls">
            <div class="info-header">
                <b>භාවිතා කරන ආකාරය:</b><br>
                භාණ්ඩය තෝරා Slider එක කරකවන්න. CONTACT වූ පසු True Reading එක (mm) ඇතුළත් කරන්න.
            </div>

            <label>භාණ්ඩය තෝරන්න (Items 20):</label>
            <select id="modeSelect" onchange="changeObject()">
                <option value="zero">ශූන්‍ය සැකසුම (Zero Reference)</option>
                <optgroup label="උස මැනීම (Height)">
                    <option value="h1">වීදුරු තැටිය</option><option value="h2">සිහින් කාසිය</option>
                    <option value="h3">ලෝහ පත්‍රය</option><option value="h4">ප්ලාස්ටික් කාඩ්පත</option>
                    <option value="h5">සිලිකන් චිපය</option><option value="h6">කුඩා බැටරිය</option>
                    <option value="h7">වීදුරු කදාව</option><option value="h8">ලී කුට්ටිය</option>
                    <option value="h9">සබන් කැටය</option><option value="h10">මකනය</option>
                </optgroup>
                <optgroup label="ගැඹුර මැනීම (Depth)">
                    <option value="d1">කුඩා සිදුර</option><option value="d2">තීන්ත කුප්පිය</option>
                    <option value="d3">ලෝහ සොකට්ටුව</option><option value="d4">ගැඹුරු ඇඟිල්ල</option>
                    <option value="d5">නලයේ ගැඹුර</option><option value="d6">කුඩා බඳුන</option>
                    <option value="d7">කාච පෘෂ්ඨය</option><option value="d8">පියනක ගැඹුර</option>
                    <option value="d9">රිං එකක ගැඹුර</option><option value="d10">සිහින් නාලය</option>
                </optgroup>
            </select>

            <label>Screw එක කරකවන්න:</label>
            <input type="range" id="screwSlider" min="-10" max="10" step="0.01" value="8" oninput="draw()">
            <div id="status" style="text-align:center; font-weight:bold; color:var(--success); height:20px; font-size: 0.9em;"></div>

            <div class="quiz-panel">
                <label>ඔබේ පිළිතුර (mm):</label>
                <div class="input-group">
                    <input type="number" id="userAnswer" step="0.01" placeholder="0.00" onkeypress="handleEnter(event)">
                    <button class="btn-submit" onclick="checkAnswer()">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div style="font-size: 1em; margin-bottom: 10px;">මෙවැනි බොහෝ දේවල් ලබා ගන්න දැන්ම එක්වන්න.</div>
        <div class="footer-brand-wrap">
            <span class="pointing-right">👉</span>
            <h2 class="footer-name">AL Science Squad 2028</h2>
            <span class="pointing-left">👈</span>
        </div>
        <div class="pointing-down">👇</div>
        <div class="footer-link">
            <a href="https://t.me/AL2028Everything" target="_blank">https://t.me/AL2028Everything</a>
        </div>
    </div>

    <script>
        function updateCounter() {
            let c = localStorage.getItem('spherometer_v_global') || 150;
            c = parseInt(c) + 1;
            localStorage.setItem('spherometer_v_global', c);
            document.getElementById('userCountDisplay').innerText = c;
        }
        updateCounter();

        const canvas = document.getElementById("labCanvas");
        const ctx = canvas.getContext("2d");
        let currentObjectHeight = 0;
        let systemZeroError = (Math.random() * 0.10 - 0.05);
        let currentTarget = systemZeroError;

        function handleEnter(e) { if (e.key === "Enter") checkAnswer(); }

        function changeObject() {
            const mode = document.getElementById("modeSelect").value;
            if(mode === "zero") { currentObjectHeight = 0; } 
            else {
                let val = (Math.random() * 5 + 1).toFixed(2);
                currentObjectHeight = mode.startsWith("h") ? parseFloat(val) : -parseFloat(val);
            }
            currentTarget = currentObjectHeight + systemZeroError;
            document.getElementById("screwSlider").value = 9.5;
            document.getElementById("userAnswer").value = "";
            draw();
        }

        function checkAnswer() {
            const userVal = parseFloat(document.getElementById("userAnswer").value);
            if (Math.abs(userVal - currentObjectHeight) < 0.015) {
                document.getElementById("congrats-overlay").style.display = "flex";
                setTimeout(() => { document.getElementById("congrats-overlay").style.display = "none"; }, 3000);
            } else { alert("පිළිතුර වැරදියි! නැවත උත්සාහ කරන්න."); }
        }

        function draw() {
            let h = parseFloat(document.getElementById("screwSlider").value);
            const target = currentTarget;
            if (h < target) { h = target; document.getElementById("screwSlider").value = h; }
            
            const statusBox = document.getElementById("status");
            if (Math.abs(h - target) < 0.04) statusBox.innerText = "✅ CONTACT (ස්පර්ශ විය)";
            else statusBox.innerText = "";

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const centerX = canvas.width / 2;
            const baseY = 400;
            const scale = 16; 

            // Object Drawing
            ctx.fillStyle = "#333";
            if (currentObjectHeight >= 0) {
                ctx.fillRect(centerX - 120, baseY, 240, 15);
                if(currentObjectHeight > 0) {
                    ctx.fillStyle = "#666";
                    ctx.fillRect(centerX - 35, baseY - (currentObjectHeight * scale), 70, currentObjectHeight * scale);
                }
            } else {
                ctx.fillRect(centerX - 110, baseY, 75, 75);
                ctx.fillRect(centerX + 35, baseY, 75, 75);
                ctx.fillStyle = "#222";
                ctx.fillRect(centerX - 35, baseY + (Math.abs(currentObjectHeight) * scale), 70, 5);
            }

            // Spherometer Legs
            ctx.fillStyle = "#888";
            ctx.fillRect(centerX - 75, baseY - 140, 150, 12);
            ctx.fillRect(centerX - 70, baseY - 128, 7, 128);
            ctx.fillRect(centerX + 63, baseY - 128, 7, 128);

            // Vertical Scale (L.S)
            ctx.strokeStyle = "#aaa"; ctx.lineWidth = 2;
            const lsX = centerX - 105;
            ctx.beginPath(); ctx.moveTo(lsX, baseY - 290); ctx.lineTo(lsX, baseY - 45); ctx.stroke();
            ctx.fillStyle = "#bbb"; ctx.font = "11px Arial"; ctx.textAlign = "right";
            for(let i=-10; i<=15; i++) {
                let y = (baseY - 140) - (i * scale);
                if(y > baseY-290 && y < baseY-45) {
                    ctx.beginPath(); ctx.moveTo(lsX-5, y); ctx.lineTo(lsX, y); ctx.stroke();
                    if(i % 5 === 0) ctx.fillText(i, lsX - 8, y + 4);
                }
            }

            // Central Screw and Circular Scale
            const sPos = (baseY - 140) - (h * scale);
            ctx.fillStyle = "#999"; ctx.fillRect(centerX - 4, sPos - 45, 8, 180);
            ctx.fillStyle = "#ffd700"; ctx.beginPath(); ctx.ellipse(centerX, sPos, 65, 18, 0, 0, 2 * Math.PI); ctx.fill();
            ctx.strokeStyle = "#000"; ctx.stroke();
            
            let vsc = Math.round((Math.abs(h) % 1) * 100);
            if (h < 0 && vsc !== 0) vsc = 100 - vsc;
            ctx.fillStyle = "black"; ctx.font = "bold 13px Arial"; ctx.textAlign = "center";
            ctx.fillText(vsc, centerX, sPos + 5);

            // Red Pointer
            ctx.fillStyle = "#ff5252"; ctx.beginPath();
            ctx.moveTo(lsX + 5, sPos); ctx.lineTo(lsX + 18, sPos - 9); ctx.lineTo(lsX + 18, sPos + 9); ctx.fill();
        }
        changeObject();
    </script>
</body>
</html>
