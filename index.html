<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spherometer Lab - AL Science Squad</title>
    <style>
        :root { --bg: #0f0f0f; --accent: #bb86fc; --success: #00ffcc; --error: #ff5252; --text: #f0f0f0; --card: #1a1a1a; }
        
        body { 
            background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 5px; margin: 0; min-height: 100vh;
        }
        
        .header-section { text-align: center; margin-top: 5px; width: 100%; }
        .logo-container { width: 55px; height: 55px; margin: 0 auto 5px; }
        .logo-img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        .main-title { font-size: 1.2em; margin: 5px 0; font-weight: bold; }
        
        .visitor-box { 
            background: rgba(0, 255, 204, 0.1); padding: 4px 12px; border-radius: 50px; 
            border: 1px solid var(--success); display: inline-block; margin-bottom: 8px;
            color: var(--success); font-size: 0.75em;
        }

        .main-wrapper { 
            display: flex; flex-direction: column; 
            background: var(--card); padding: 10px; border-radius: 15px; gap: 10px; 
            border: 1px solid #333; width: 98%; max-width: 500px; 
            align-items: center;
        }

        @media (min-width: 850px) {
            .main-wrapper { flex-direction: row; max-width: 900px; padding: 20px; }
            .main-title { font-size: 1.6em; }
        }

        .canvas-container { width: 100%; max-width: 360px; flex-shrink: 0; }
        canvas { 
            background: #151515; border-radius: 10px; border: 1px solid #444; 
            width: 100% !important; height: auto !important; display: block;
        }
        
        .controls { flex: 1; display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .info-header { background: rgba(255, 82, 82, 0.1); padding: 8px; border-radius: 8px; border-left: 4px solid var(--error); font-size: 0.75em; }

        .quiz-panel { background: #222; padding: 12px; border-radius: 12px; border: 1px solid #333; }
        .input-group { display: flex; gap: 8px; margin-top: 5px; }
        
        input[type=number] { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #444; background: #000; color: white; text-align: center; font-size: 1em; }
        .btn-submit { background: var(--success); color: #000; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        input[type=range] { width: 100%; cursor: pointer; height: 15px; accent-color: var(--accent); margin: 5px 0; }
        select { padding: 10px; border-radius: 8px; background: #2c2c2c; color: white; border: 1px solid #444; width: 100%; font-size: 0.9em; }
        
        .footer { margin-top: 20px; text-align: center; padding: 15px; width: 100%; }
        .footer-name { font-size: 1.2em; font-weight: bold; color: var(--accent); margin: 5px 0; }
        .pointing-down { font-size: 1.8em; animation: bounceY 1s infinite; }

        @keyframes bounceY { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(8px); } }

        #congrats-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: rgba(0,0,0,0.9); }
    </style>
</head>
<body>

    <div id="congrats-overlay">
        <h1 style="color: var(--success); font-size: 2.5em;">EXCELLENT!</h1>
        <p style="color: white;">මිනුම නිවැරදියි! 🎊</p>
    </div>

    <div class="header-section">
        <div class="logo-container"><img src="photo_2026-06-02_10-22-04.jpg" alt="Logo" class="logo-img"></div>
        <div class="main-title">ගෝලමානය AI Simulation</div>
        <div class="visitor-box">🌐 පරිශීලකයන්: <span id="userCountDisplay">150</span>+</div>
    </div>

    <div class="main-wrapper">
        <div class="canvas-container">
            <canvas id="labCanvas" width="360" height="480"></canvas>
        </div>

        <div class="controls">
            <div class="info-header">
                <b>භාවිතා කරන ආකාරය:</b><br>
                භාණ්ඩය තෝරා Slider එක කරකවන්න. CONTACT වූ පසු නිවැරදි mm අගය ඇතුළත් කරන්න.
            </div>

            <select id="modeSelect" onchange="changeObject()">
                <option value="zero">ශූන්‍ය සැකසුම (Zero Reference)</option>
                <optgroup label="--- උස මැනීම (Height) ---">
                    <option value="h1">1. වීදුරු තැටිය</option><option value="h2">2. සිහින් කාසිය</option>
                    <option value="h3">3. ලෝහ පත්‍රය</option><option value="h4">4. ප්ලාස්ටික් කාඩ්පත</option>
                    <option value="h5">5. සිලිකන් චිපය</option><option value="h6">6. කුඩා බැටරිය</option>
                    <option value="h7">7. වීදුරු කදාව</option><option value="h8">8. ලී කුට්ටිය</option>
                    <option value="h9">9. සබන් කැටය</option><option value="h10">10. මකනය</option>
                </optgroup>
                <optgroup label="--- ගැඹුර මැනීම (Depth) ---">
                    <option value="d1">11. කුඩා සිදුර</option><option value="d2">12. තීන්ත කුප්පිය</option>
                    <option value="d3">13. ලෝහ සොකට්ටුව</option><option value="d4">14. ගැඹුරු ඇඟිල්ල</option>
                    <option value="d5">15. නලයේ ගැඹුර</option><option value="d6">16. කුඩා බඳුන</option>
                    <option value="d7">17. කාච පෘෂ්ඨය</option><option value="d8">18. පියනක ගැඹුර</option>
                    <option value="d9">19. රිං එකක ගැඹුර</option><option value="d10">20. සිහින් නාලය</option>
                </optgroup>
            </select>

            <input type="range" id="screwSlider" min="-10" max="10" step="0.01" value="8" oninput="draw()">
            <div id="status" style="text-align:center; font-weight:bold; color:var(--success); height:20px; font-size: 0.8em;"></div>

            <div class="quiz-panel">
                <label style="font-size: 0.8em;">පාඨාංකය (mm):</label>
                <div class="input-group">
                    <input type="number" id="userAnswer" step="0.01" placeholder="0.00" onkeypress="handleEnter(event)">
                    <button class="btn-submit" onclick="checkAnswer()">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <h2 class="footer-name">AL Science Squad 2028</h2>
        <div class="pointing-down">👇</div>
        <div class="footer-link">
            <a href="https://t.me/AL2028Everything" target="_blank" style="color:var(--success); text-decoration:none; font-weight:bold;">Join Telegram Group</a>
        </div>
    </div>

    <script>
        function updateCounter() {
            let c = localStorage.getItem('sph_final_count') || 150;
            c = parseInt(c) + 1;
            localStorage.setItem('sph_final_count', c);
            document.getElementById('userCountDisplay').innerText = c;
        }
        updateCounter();

        const canvas = document.getElementById("labCanvas");
        const ctx = canvas.getContext("2d");
        let currentObjectHeight = 0;
        let systemZeroError = (Math.random() * 0.10 - 0.05);
        let currentTarget = systemZeroError;

        function handleEnter(e) { if (e.key === "Enter") checkAnswer(); }

        function changeObject() {
            const mode = document.getElementById("modeSelect").value;
            if(mode === "zero") { currentObjectHeight = 0; } 
            else {
                // වස්තුවේ උස -8mm සිට +8mm දක්වා පරාසයක පැවතිය හැක
                let val = (Math.random() * 7 + 1).toFixed(2);
                currentObjectHeight = mode.startsWith("h") ? parseFloat(val) : -parseFloat(val);
            }
            currentTarget = currentObjectHeight + systemZeroError;
            document.getElementById("screwSlider").value = 10;
            document.getElementById("userAnswer").value = "";
            draw();
        }

        function checkAnswer() {
            const userVal = parseFloat(document.getElementById("userAnswer").value);
            if (Math.abs(userVal - currentObjectHeight) < 0.02) {
                document.getElementById("congrats-overlay").style.display = "flex";
                setTimeout(() => { document.getElementById("congrats-overlay").style.display = "none"; }, 2500);
            } else { alert("පිළිතුර වැරදියි!"); }
        }

        function draw() {
            let h = parseFloat(document.getElementById("screwSlider").value);
            if (h < currentTarget) { h = currentTarget; document.getElementById("screwSlider").value = h; }
            
            const statusBox = document.getElementById("status");
            if (Math.abs(h - currentTarget) < 0.04) statusBox.innerText = "✅ CONTACT (ස්පර්ශ විය)";
            else statusBox.innerText = "";

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2;
            const baseY = 250; // පරිමාණය මැදට ගෙන ඒමට
            const scale = 18;  // පරිමාණයේ පරතරය

            // වස්තුව ඇඳීම
            ctx.fillStyle = "#333";
            if (currentObjectHeight >= 0) {
                ctx.fillRect(cx - 110, baseY, 220, 10); // පදනම
                if(currentObjectHeight > 0) {
                    ctx.fillStyle = "#555";
                    ctx.fillRect(cx - 30, baseY - (currentObjectHeight * scale), 60, currentObjectHeight * scale);
                }
            } else {
                ctx.fillRect(cx - 110, baseY, 70, 150);
                ctx.fillRect(cx + 40, baseY, 70, 150);
                ctx.fillStyle = "#222";
                ctx.fillRect(cx - 40, baseY + (Math.abs(currentObjectHeight) * scale), 80, 5);
            }

            // ගෝලමාන රාමුව
            ctx.fillStyle = "#777";
            ctx.fillRect(cx - 65, baseY - 120, 130, 10);
            ctx.fillRect(cx - 60, baseY - 110, 6, 110);
            ctx.fillRect(cx + 54, baseY - 110, 6, 110);

            // සිරස් පරිමාණය (Linear Scale) -10 සිට +10 දක්වා
            ctx.strokeStyle = "#888"; ctx.lineWidth = 2;
            const lx = cx - 95;
            ctx.beginPath(); ctx.moveTo(lx, baseY - (10 * scale) - 20); ctx.lineTo(lx, baseY + (10 * scale) + 20); ctx.stroke();
            
            ctx.fillStyle = "#aaa"; ctx.font = "10px Arial"; ctx.textAlign = "right";
            for(let i = -10; i <= 10; i++) {
                let y = baseY - (i * scale);
                ctx.beginPath(); ctx.moveTo(lx - 5, y); ctx.lineTo(lx, y); ctx.stroke();
                if(i % 5 === 0) ctx.fillText(i, lx - 8, y + 3);
            }

            // ඉස්කුරුප්පුව සහ වෘත්තාකාර පරිමාණය
            const sY = baseY - (h * scale);
            ctx.fillStyle = "#999"; ctx.fillRect(cx - 3, sY - 50, 6, 200); // Screw shaft
            ctx.fillStyle = "#ffd700"; ctx.beginPath(); ctx.ellipse(cx, sY, 58, 16, 0, 0, 2 * Math.PI); ctx.fill();
            ctx.strokeStyle = "#000"; ctx.stroke();
            
            let v = Math.round((Math.abs(h) % 1) * 100);
            if (h < 0 && v !== 0) v = 100 - v;
            ctx.fillStyle = "black"; ctx.font = "bold 12px Arial"; ctx.textAlign = "center";
            ctx.fillText(v, cx, sY + 4);

            // රතු පාට දර්ශකය
            ctx.fillStyle = "#ff5252"; ctx.beginPath();
            ctx.moveTo(lx + 4, sY); ctx.lineTo(lx + 14, sY - 7); ctx.lineTo(lx + 14, sY + 7); ctx.fill();
        }
        changeObject();
    </script>
</body>
</html>
