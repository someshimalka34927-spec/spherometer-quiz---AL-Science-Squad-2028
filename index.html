<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spherometer Lab - AL Science Squad</title>
    <style>
        :root { --bg: #0f0f0f; --accent: #bb86fc; --success: #00ffcc; --error: #ff5252; --text: #f0f0f0; --card: #1a1a1a; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 5px; margin: 0; min-height: 100vh; }
        .header-section { text-align: center; margin-top: 5px; width: 100%; }
        .logo-container { width: 55px; height: 55px; margin: 0 auto 5px; }
        .logo-img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        .main-title { font-size: 1.2em; margin: 5px 0; font-weight: bold; }
        .visitor-box { background: rgba(0, 255, 204, 0.1); padding: 4px 12px; border-radius: 50px; border: 1px solid var(--success); display: inline-block; margin-bottom: 8px; color: var(--success); font-size: 0.75em; }
        .main-wrapper { display: flex; flex-direction: column; background: var(--card); padding: 10px; border-radius: 15px; gap: 10px; border: 1px solid #333; width: 98%; max-width: 500px; align-items: center; }
        @media (min-width: 850px) { .main-wrapper { flex-direction: row; max-width: 900px; padding: 20px; } }
        .canvas-container { width: 100%; max-width: 360px; }
        canvas { background: #151515; border-radius: 10px; border: 1px solid #444; width: 100% !important; height: auto !important; display: block; }
        .controls { flex: 1; display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .info-header { background: rgba(255, 82, 82, 0.1); padding: 8px; border-radius: 8px; border-left: 4px solid var(--error); font-size: 0.75em; }
        .quiz-panel { background: #222; padding: 12px; border-radius: 12px; border: 1px solid #333; }
        .input-group { display: flex; gap: 8px; margin-top: 5px; }
        input[type=number] { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #444; background: #000; color: white; text-align: center; font-size: 1em; }
        .btn-submit { background: var(--success); color: #000; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        input[type=range] { width: 100%; cursor: pointer; height: 15px; accent-color: var(--accent); margin: 5px 0; }
        select { padding: 10px; border-radius: 8px; background: #2c2c2c; color: white; border: 1px solid #444; width: 100%; font-size: 0.9em; }
        .footer { margin-top: 20px; text-align: center; padding: 15px; width: 100%; }
        #congrats-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: rgba(0,0,0,0.9); }
    </style>
</head>
<body>

    <div id="congrats-overlay">
        <h1 style="color: var(--success); font-size: 2.5em;">EXCELLENT!</h1>
        <p style="color: white;">මිනුම නිවැරදියි! 🎊</p>
    </div>

    <div class="header-section">
        <div class="logo-container"><img src="photo_2026-06-02_10-22-04.jpg" alt="Logo" class="logo-img"></div>
        <div class="main-title">ගෝලමානය AI Simulation</div>
        <div class="visitor-box">🌐 පරිශීලකයන්: <span id="userCountDisplay">...</span></div>
    </div>

    <div class="main-wrapper">
        <div class="canvas-container">
            <canvas id="labCanvas" width="360" height="480"></canvas>
        </div>

        <div class="controls">
            <div class="info-header"><b>භාවිතය:</b> Slider එක පහළට ගෙන ගොස් වස්තුවේ ස්පර්ශ කරන්න. (Contact වූ පසු පාඨාංකය ලබාගන්න)</div>

            <select id="modeSelect" onchange="changeObject()">
                <option value="zero">ශූන්‍ය සැකසුම (Zero Reference)</option>
                <optgroup label="--- උස මැනීම (Height) ---">
                    <option value="h1">1. වීදුරු තැටිය</option><option value="h2">2. සිහින් කාසිය</option>
                    <option value="h3">3. ලෝහ පත්‍රය</option><option value="h4">4. ප්ලාස්ටික් කාඩ්පත</option>
                    <option value="h5">5. සිලිකන් චිපය</option><option value="h6">6. කුඩා බැටරිය</option>
                </optgroup>
                <optgroup label="--- ගැඹුර මැනීම (Depth) ---">
                    <option value="d1">11. කුඩා සිදුර</option><option value="d2">12. තීන්ත කුප්පිය</option>
                    <option value="d3">13. ලෝහ සොකට්ටුව</option>
                </optgroup>
            </select>

            <input type="range" id="screwSlider" min="-10.0" max="10.0" step="0.01" value="10" oninput="draw()">
            <div id="status" style="text-align:center; font-weight:bold; color:var(--success); height:20px; font-size: 0.8em;"></div>

            <div class="quiz-panel">
                <label style="font-size: 0.8em;">පාඨාංකය (mm):</label>
                <div class="input-group">
                    <input type="number" id="userAnswer" step="0.01" placeholder="0.00">
                    <button class="btn-submit" onclick="checkAnswer()">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <h2 style="color:var(--accent); font-size:1.2em;">AL Science Squad 2028</h2>
        <a href="https://t.me/AL2028Everything" target="_blank" style="color:var(--success); text-decoration:none; font-weight:bold;">Join Telegram</a>
    </div>

    <script>
        function updateCounter() {
            let c = localStorage.getItem('sph_v_logic_fix') || 150;
            c = parseInt(c) + 1; localStorage.setItem('sph_v_logic_fix', c);
            document.getElementById('userCountDisplay').innerText = c;
        }
        updateCounter();

        const canvas = document.getElementById("labCanvas");
        const ctx = canvas.getContext("2d");
        let currentObjectHeight = 0;
        let systemZeroError = (Math.random() * 0.10 - 0.05);
        let currentTarget = systemZeroError;

        function changeObject() {
            const mode = document.getElementById("modeSelect").value;
            if(mode === "zero") { currentObjectHeight = 0; } 
            else {
                let val = (Math.random() * 5 + 1).toFixed(2);
                currentObjectHeight = mode.startsWith("h") ? parseFloat(val) : -parseFloat(val);
            }
            currentTarget = currentObjectHeight + systemZeroError;
            document.getElementById("screwSlider").value = 10; // ආරම්භයේදී ඉස්කුරුප්පුව උඩ තියෙන්නේ
            document.getElementById("userAnswer").value = "";
            draw();
        }

        function checkAnswer() {
            const userVal = parseFloat(document.getElementById("userAnswer").value);
            if (Math.abs(userVal - currentObjectHeight) < 0.02) {
                document.getElementById("congrats-overlay").style.display = "flex";
                setTimeout(() => { document.getElementById("congrats-overlay").style.display = "none"; }, 2500);
            } else { alert("පිළිතුර වැරදියි!"); }
        }

        function draw() {
            let h = parseFloat(document.getElementById("screwSlider").value);
            
            // වැදගත්ම කොටස: ඉස්කුරුප්පුව පහළට යද්දී (h අගය අඩු වෙද්දී) 
            // Target එකේ වැදුණු සැනින් එතනින් එහාට (පහළට) යන්න බැහැ.
            if (h < currentTarget) { 
                h = currentTarget; 
                document.getElementById("screwSlider").value = h; 
            }
            
            const statusBox = document.getElementById("status");
            if (Math.abs(h - currentTarget) < 0.05) statusBox.innerText = "✅ CONTACT (ස්පර්ශ විය)";
            else statusBox.innerText = "";

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2;
            const baseY = 240; 
            const scale = 20;

            // DRAW OBJECT
            ctx.fillStyle = "#333";
            if (currentObjectHeight >= 0) {
                ctx.fillRect(cx - 120, baseY, 240, 10);
                if(currentObjectHeight > 0) {
                    ctx.fillStyle = "#555";
                    ctx.fillRect(cx - 35, baseY - (currentObjectHeight * scale), 70, currentObjectHeight * scale);
                }
            } else {
                ctx.fillRect(cx - 120, baseY, 80, 180);
                ctx.fillRect(cx + 40, baseY, 80, 180);
                ctx.fillStyle = "#222";
                ctx.fillRect(cx - 40, baseY + (Math.abs(currentObjectHeight) * scale), 80, 5);
            }

            // FIXED LEGS
            ctx.fillStyle = "#777";
            ctx.fillRect(cx - 70, baseY - 120, 140, 12);
            ctx.fillRect(cx - 65, baseY - 110, 8, 110);
            ctx.fillRect(cx + 57, baseY - 110, 8, 110);

            // LINEAR SCALE (-10 to 10)
            ctx.strokeStyle = "#888"; ctx.lineWidth = 2;
            const lx = cx - 100;
            ctx.beginPath(); 
            ctx.moveTo(lx, baseY - (10 * scale) - 20); 
            ctx.lineTo(lx, baseY + (10 * scale) + 20); ctx.stroke();
            
            ctx.fillStyle = "#aaa"; ctx.font = "10px Arial"; ctx.textAlign = "right";
            for(let i = -10; i <= 10; i++) {
                let y = baseY - (i * scale);
                ctx.beginPath(); ctx.moveTo(lx - 5, y); ctx.lineTo(lx, y); ctx.stroke();
                if(i % 5 === 0) ctx.fillText(i, lx - 8, y + 3);
            }

            // MOVING SCREW
            const screwBottomY = baseY - (h * scale);
            ctx.fillStyle = "#999"; 
            ctx.fillRect(cx - 4, screwBottomY - 180, 8, 180); // Screw shaft
            
            ctx.fillStyle = "#ffd700"; 
            ctx.beginPath(); 
            ctx.ellipse(cx, screwBottomY, 60, 18, 0, 0, 2 * Math.PI); 
            ctx.fill(); ctx.stroke();
            
            // CIRCULAR SCALE READING
            let v = Math.round((Math.abs(h) % 1) * 100);
            if (h < 0 && v !== 0) v = 100 - v;
            if (v === 100) v = 0;
            ctx.fillStyle = "black"; ctx.font = "bold 13px Arial"; ctx.textAlign = "center";
            ctx.fillText(v, cx, screwBottomY + 5);

            // RED POINTER (Linear scale එක මනින්නේ මෙතැනින්)
            ctx.fillStyle = "#ff5252"; ctx.beginPath();
            ctx.moveTo(lx + 4, screwBottomY); ctx.lineTo(lx + 15, screwBottomY - 8); ctx.lineTo(lx + 15, screwBottomY + 8); ctx.fill();
        }
        changeObject();
    </script>
</body>
</html>
