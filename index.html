<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spherometer Lab - AL Science Squad</title>
    <style>
        :root { --bg: #0f0f0f; --accent: #bb86fc; --success: #00ffcc; --error: #ff5252; --text: #f0f0f0; --card: #1a1a1a; }
        
        body { 
            background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            padding: 10px; margin: 0; min-height: 100vh; overflow-x: hidden; 
        }
        
        /* Header */
        .header-section { text-align: center; margin-bottom: 15px; width: 100%; }
        .logo-container { width: 90px; height: 90px; margin: 0 auto 10px; }
        .logo-img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; }
        .main-title { font-size: 1.6em; color: var(--text); margin: 5px 0; font-weight: bold; }
        .sub-title { font-size: 1em; color: var(--accent); letter-spacing: 1px; }

        /* Main Container */
        .main-wrapper { 
            display: flex; background: var(--card); padding: 20px; border-radius: 25px; gap: 30px; 
            border: 1px solid #333; box-shadow: 0 30px 60px rgba(0,0,0,0.8); 
            width: 95%; max-width: 1200px; align-items: center; justify-content: center;
        }

        /* Responsive Canvas */
        .canvas-container { flex-shrink: 0; width: 100%; max-width: 480px; }
        canvas { 
            background: #222; border-radius: 15px; border: 1px solid #444; 
            width: 100% !important; height: auto !important; display: block;
        }
        
        .controls { flex: 1; display: flex; flex-direction: column; gap: 15px; width: 100%; min-width: 300px; }
        
        .info-header { 
            background: rgba(255, 82, 82, 0.1); padding: 15px; border-radius: 12px; 
            border-left: 5px solid var(--error); font-size: 0.9em; line-height: 1.5; 
        }

        .quiz-panel { background: #252525; padding: 20px; border-radius: 20px; border: 1px solid #3d3d3d; }
        .input-group { display: flex; gap: 10px; margin-top: 10px; }
        
        input[type=number] { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #111; color: white; font-size: 1.2em; text-align: center; }
        .btn-submit { background: var(--success); color: #000; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        input[type=range] { width: 100%; cursor: pointer; height: 10px; accent-color: var(--accent); margin: 10px 0; }
        select { padding: 12px; border-radius: 10px; background: #2c2c2c; color: white; border: 1px solid #444; font-size: 1em; cursor: pointer; width: 100%; }
        
        .visitor-box { background: #1a1a1a; padding: 5px 15px; border-radius: 50px; border: 1px solid #444; display: inline-block; margin-top: 10px; font-family: monospace; color: var(--success); font-size: 0.9em; }

        .footer { margin-top: 30px; text-align: center; width: 100%; max-width: 600px; padding-bottom: 30px; }
        .footer-name { font-size: 1.5em; font-weight: bold; color: var(--accent); margin: 8px 0; }
        .footer-link a { color: var(--success); text-decoration: none; font-weight: bold; font-size: 1em; word-break: break-all; }

        /* Tablet & Desktop Layout */
        @media (min-width: 900px) {
            .main-wrapper { flex-direction: row; padding: 40px; gap: 50px; }
            .main-title { font-size: 2.2em; }
            .header-section { margin-bottom: 25px; }
            .logo-container { width: 120px; height: 120px; }
        }

        /* Mobile Layout */
        @media (max-width: 899px) {
            .main-wrapper { flex-direction: column; padding: 15px; gap: 20px; width: 92%; }
            .controls { min-width: 100%; }
            .info-header { font-size: 0.8em; }
        }

        #congrats-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: rgba(0,0,0,0.85); }
        .congrats-text { font-size: 3em; font-weight: 900; color: var(--success); text-shadow: 0 0 20px var(--success); }
    </style>
</head>
<body>

    <div id="congrats-overlay">
        <div class="congrats-text">EXCELLENT!</div>
        <div style="font-size: 1.5em; color: white; margin-top: 10px;">මිනුම නිවැරදියි! 🎊</div>
    </div>

    <div class="header-section">
        <div class="logo-container">
            <img src="photo_2026-06-02_10-22-04.jpg" alt="Logo" class="logo-img">
        </div>
        <div class="main-title">ගෝලමානය AI Simulation</div>
        <div class="sub-title">AL Science Squad 2028</div>
        <div class="visitor-box">🌐 පරිශීලකයන්: <span id="count">150+</span></div>
    </div>

    <div class="main-wrapper">
        <div class="canvas-container">
            <canvas id="labCanvas" width="480" height="650"></canvas>
        </div>

        <div class="controls">
            <div class="info-header">
                <b>භාවිතා කරන ආකාරය:</b><br>
                1. <b>Zero Reference</b> තෝරා දෝෂය බලන්න.<br>
                2. වස්තුව තෝරා, ඉස්කුරුප්පුව කරකවා නිවැරදි මිනුම ගණනය කරන්න.
            </div>

            <label>භාණ්ඩය තෝරන්න:</label>
            <select id="modeSelect" onchange="changeObject()">
                <option value="zero">ශූන්‍ය සැකසුම (Zero Reference)</option>
                <optgroup label="උස මැනීම (Height)">
                    <option value="h1">වීදුරු තැටිය</option><option value="h2">සිහින් කාසිය</option>
                    <option value="h3">ලෝහ පත්‍රය</option><option value="h4">ප්ලාස්ටික් කාඩ්පත</option>
                    <option value="h5">සිලිකන් චිපය</option><option value="h6">කුඩා බැටරිය</option>
                    <option value="h7">වීදුරු කදාව</option><option value="h8">ලී කුට්ටිය</option>
                    <option value="h9">සබන් කැටය</option><option value="h10">මකනය</option>
                </optgroup>
                <optgroup label="ගැඹුර මැනීම (Depth)">
                    <option value="d1">කුඩා සිදුර</option><option value="d2">තීන්ත කුප්පිය</option>
                    <option value="d3">ලෝහ සොකට්ටුව</option><option value="d4">ගැඹුරු ඇඟිල්ල</option>
                    <option value="d5">නලයේ ගැඹුර</option><option value="d6">කුඩා බඳුන</option>
                    <option value="d7">කාච පෘෂ්ඨය</option><option value="d8">පියනක ගැඹුර</option>
                    <option value="d9">රිං එකක ගැඹුර</option><option value="d10">සිහින් නාලය</option>
                </optgroup>
            </select>

            <label>ඉස්කුරුප්පුව කරකවන්න:</label>
            <input type="range" id="screwSlider" min="-10" max="10" step="0.01" value="8" oninput="draw()">
            <div id="status" style="text-align:center; font-weight:bold; color:var(--success); height:25px;"></div>

            <div class="quiz-panel">
                <label>පිළිතුර (mm):</label>
                <div class="input-group">
                    <input type="number" id="userAnswer" step="0.01" placeholder="0.00" onkeypress="handleEnter(event)">
                    <button class="btn-submit" onclick="checkAnswer()">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="footer-name">AL Science Squad 2028</div>
        <div class="footer-link"><a href="https://t.me/AL2028Everything" target="_blank">https://t.me/AL2028Everything</a></div>
    </div>

    <script>
        function handleEnter(e) { if (e.key === "Enter" || e.keyCode === 13) { checkAnswer(); } }
        let count = localStorage.getItem('spherometer_v') || 150;
        count = parseInt(count) + 1;
        localStorage.setItem('spherometer_v', count);
        document.getElementById('count').innerText = count + "+";

        const canvas = document.getElementById("labCanvas");
        const ctx = canvas.getContext("2d");
        let systemZeroError = (Math.random() * 0.12 - 0.06); 
        let currentObjectHeight = 0;
        let currentTarget = systemZeroError;

        function changeObject() {
            const mode = document.getElementById("modeSelect").value;
            if(mode === "zero") { currentObjectHeight = 0; } 
            else {
                let val = (Math.random() * 6 + 1).toFixed(2);
                currentObjectHeight = mode.startsWith("h") ? parseFloat(val) : -parseFloat(val);
            }
            currentTarget = currentObjectHeight + systemZeroError;
            document.getElementById("screwSlider").value = 10;
            document.getElementById("userAnswer").value = ""; 
            draw();
        }

        function checkAnswer() {
            const userVal = parseFloat(document.getElementById("userAnswer").value);
            if (isNaN(userVal)) return;
            if (Math.abs(userVal - currentObjectHeight) < 0.015) {
                document.getElementById("congrats-overlay").style.display = "flex";
                setTimeout(() => { document.getElementById("congrats-overlay").style.display = "none"; }, 3500);
            } else { alert("පිළිතුර වැරදියි!"); }
        }

        function draw() {
            let h = parseFloat(document.getElementById("screwSlider").value);
            const target = currentTarget; const baseY = 420; const scale = 22;
            const statusBox = document.getElementById("status");

            if (h < target) { h = target; document.getElementById("screwSlider").value = h; 
                statusBox.innerText = "⛔ ස්පර්ශ විය (CONTACT)"; statusBox.style.color = "var(--error)";
            } else if (Math.abs(h - target) < 0.045) { 
                statusBox.innerText = "✅ නිවැරදි ස්පර්ශය"; statusBox.style.color = "var(--success)";
            } else { statusBox.innerText = ""; }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#333";
            if (currentObjectHeight < 0) {
                ctx.fillRect(40, baseY, 150, 150); ctx.fillRect(290, baseY, 150, 150);
                ctx.fillStyle = "#555"; ctx.fillRect(190, baseY + (Math.abs(currentObjectHeight) * scale), 100, 10);
            } else {
                ctx.fillRect(40, baseY, 400, 25);
                if (currentObjectHeight > 0) { ctx.fillStyle = "#555"; ctx.fillRect(190, baseY - (currentObjectHeight * scale), 100, currentObjectHeight * scale); }
            }
            ctx.fillStyle = "#888"; ctx.fillRect(120, baseY - 200, 240, 18);
            ctx.fillRect(130, baseY - 182, 12, 182); ctx.fillRect(338, baseY - 182, 12, 182);
            ctx.strokeStyle = "#888"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(90, 50); ctx.lineTo(90, 550); ctx.stroke();
            ctx.fillStyle = "#aaa"; ctx.font = "13px Arial"; ctx.textAlign = "right";
            for(let i=-10; i<=15; i++) {
                let y = (baseY - 200) - (i * scale);
                ctx.moveTo(82, y); ctx.lineTo(90, y); ctx.stroke();
                if(i % 5 === 0) ctx.fillText(i, 78, y + 5);
            }
            const sPos = (baseY - 200) - (h * scale);
            ctx.fillStyle = "#aaa"; ctx.fillRect(235, sPos - 40, 8, 240);
            ctx.beginPath(); ctx.moveTo(230, sPos + 200); ctx.lineTo(250, sPos + 200); ctx.lineTo(240, sPos + 215); ctx.fill();
            let vsc = Math.round((Math.abs(h) % 1) * 100); if (h < 0 && vsc !== 0) vsc = 100 - vsc;
            ctx.fillStyle = "#ffd700"; ctx.beginPath(); ctx.ellipse(240, sPos, 90, 25, 0, 0, 2 * Math.PI); ctx.fill();
            ctx.strokeStyle = "#000"; ctx.stroke(); ctx.fillStyle = "black"; ctx.font = "bold 16px Arial"; ctx.textAlign = "center"; ctx.fillText(vsc, 240, sPos + 6);
            ctx.fillStyle = "#ff5252"; ctx.beginPath(); ctx.moveTo(100, sPos); ctx.lineTo(115, sPos-12); ctx.lineTo(115, sPos+12); ctx.fill();
        }
        changeObject();
    </script>
</body>
</html>
